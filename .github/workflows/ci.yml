name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  LIBMAT_VERSION: main

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Clone libmat
        run: git clone --branch ${{ env.LIBMAT_VERSION }} --depth 1 https://github.com/alvgaona/libmat vendor/libmat

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build
        run: cargo build --verbose

      - name: Test
        run: cargo test --verbose
